<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Debrain</title>
<meta name="theme-color" content="#14181B">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#14181B; --surface:#1C2226; --surface-2:#242B30; --line:#2E363C;
    --gold:#C9A876; --sage:#6B9C89; --text:#E8E4DB; --text-muted:#848D93; --danger:#B4664F;
    --font-mono:'JetBrains Mono', ui-monospace, 'SF Mono', Consolas, monospace;
    --font-sans:'Inter', -apple-system, system-ui, sans-serif;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-sans); }
  body { -webkit-font-smoothing: antialiased; overscroll-behavior: none; }

  /* ---------- Gate ---------- */
  #gate {
    position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 18px; z-index: 100;
  }
  #gate .mark { font-family: var(--font-mono); color: var(--sage); font-size: 12px; letter-spacing: .25em; text-transform: uppercase; }
  #gate input {
    background: var(--surface); border: 1px solid var(--line); color: var(--text);
    font-family: var(--font-mono); font-size: 20px; letter-spacing: .3em; text-align: center;
    padding: 14px 18px; border-radius: 8px; width: 200px; outline: none;
  }
  #gate input:focus { border-color: var(--sage); }
  #gate .err { color: var(--danger); font-size: 12px; font-family: var(--font-mono); height: 14px; }
  #gate button {
    background: var(--sage); color: #14181B; border: none; border-radius: 8px; padding: 12px 22px;
    font-family: var(--font-mono); font-weight: 600; letter-spacing: .1em; text-transform: uppercase; font-size: 12px;
    cursor: pointer;
  }

  /* ---------- App ---------- */
  #app { display: none; }
  #app.visible { display: block; }

  .shell { max-width: 720px; margin: 0 auto; height: 100dvh; display: flex; flex-direction: column; }
  header {
    padding: 20px 16px 14px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between;
  }
  .brand { display: flex; align-items: baseline; gap: 10px; }
  .brand-name { font-size: 20px; font-weight: 700; }
  .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--sage); box-shadow: 0 0 6px var(--sage); animation: pulse 2.6s infinite; }
  .dot.thinking { animation: pulse 0.8s infinite; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(107,156,137,.5)} 70%{box-shadow:0 0 0 9px rgba(107,156,137,0)} 100%{box-shadow:0 0 0 0 rgba(107,156,137,0)} }
  .tag { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-muted); letter-spacing: .08em; text-transform: uppercase; }
  .back-link { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); text-decoration: none; letter-spacing: .05em; }
  .back-link:hover { color: var(--gold); }

  main { flex: 1; overflow-y: auto; padding: 18px 16px; display: flex; flex-direction: column; gap: 14px; }
  .msg { display: flex; flex-direction: column; gap: 5px; max-width: 88%; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.assistant { align-self: flex-start; }
  .who { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); letter-spacing: .08em; text-transform: uppercase; }
  .bubble {
    padding: 11px 14px; border-radius: 12px; font-size: 14px; line-height: 1.55;
    white-space: pre-wrap; word-wrap: break-word;
  }
  .msg.user .bubble { background: rgba(201,168,118,0.14); color: var(--text); border: 1px solid var(--gold); border-bottom-right-radius: 3px; }
  .msg.assistant .bubble { background: var(--surface); border: 1px solid var(--line); border-bottom-left-radius: 3px; }

  footer { padding: 12px 16px 18px; border-top: 1px solid var(--line); }
  form { display: flex; gap: 10px; }
  textarea {
    flex: 1; resize: none; background: var(--surface); border: 1px solid var(--line); color: var(--text);
    font-family: var(--font-sans); font-size: 14px; padding: 12px 14px; border-radius: 10px; outline: none;
    min-height: 46px; max-height: 140px;
  }
  textarea:focus { border-color: var(--gold); }
  button.send {
    background: var(--gold); color: #14181B; border: none; padding: 0 20px;
    font-family: var(--font-mono); font-weight: 700; font-size: 12.5px; letter-spacing: .05em;
    text-transform: uppercase; border-radius: 10px; cursor: pointer;
  }
  button.send:disabled { opacity: .5; }
  button.send:active { transform: scale(.96); }

  button.attach {
    background: var(--surface); border: 1px solid var(--line); color: var(--text-muted);
    width: 46px; height: 46px; border-radius: 10px; font-size: 18px; cursor: pointer; flex-shrink: 0;
  }
  button.attach:hover { border-color: var(--sage); color: var(--sage); }
  button.attach:disabled { opacity: .5; cursor: default; }
  .ocr-status { font-family: var(--font-mono); font-size: 11px; color: var(--sage); margin-top: 8px; text-align: center; }

  .empty { color: var(--text-muted); font-size: 13px; margin-top: 30px; line-height: 1.7; font-family: var(--font-mono); text-align: center; }
  ::-webkit-scrollbar { width: 7px; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
</style>
</head>
<body>

<div id="gate">
  <div class="mark">◆ DEBRAIN — DOSTĘP</div>
  <input id="pinInput" type="password" inputmode="numeric" maxlength="8" placeholder="PIN" autocomplete="off">
  <div class="err" id="gateErr"></div>
  <button onclick="tryUnlock()">Odblokuj</button>
</div>

<div id="app">
  <div class="shell">
    <header>
      <div class="brand"><span class="dot" id="statusDot"></span><span class="brand-name">Debrain</span><span class="tag" id="modelTag">deepseek-chat</span></div>
      <a class="back-link" href="index.html">◆ Baza</a>
    </header>
    <main id="chatLog">
      <div class="empty">Ładowanie pamięci…</div>
    </main>
    <footer>
      <form id="chatForm">
        <button type="button" class="attach" id="attachBtn" title="Załącz zrzut ekranu (OCR)">📎</button>
        <input type="file" id="imageInput" accept="image/*" style="display:none">
        <textarea id="input" placeholder="Zapytaj Debrain… (/reasoner, /chat, /nowa)" rows="1"></textarea>
        <button type="submit" class="send" id="sendBtn">Wyślij</button>
      </form>
      <div id="ocrStatus" class="ocr-status" style="display:none"></div>
    </footer>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
  // ---------- Własny PIN dla Debrain (niezależny od PIN-u Bazy) ----------
  const DEBRAIN_PIN = "5855"; // <-- zmień na swój, jeśli chcesz inny niż PIN Bazy

  function tryUnlock(){
    const val = document.getElementById('pinInput').value;
    if(val === DEBRAIN_PIN){
      sessionStorage.setItem('debrain_unlocked','1');
      document.getElementById('gate').style.display='none';
      document.getElementById('app').classList.add('visible');
      initChat();
    } else {
      document.getElementById('gateErr').textContent = 'Zły PIN';
      document.getElementById('pinInput').value='';
    }
  }
  document.getElementById('pinInput').addEventListener('keydown', e=>{ if(e.key==='Enter') tryUnlock(); });

  if(sessionStorage.getItem('debrain_unlocked')==='1'){
    document.getElementById('gate').style.display='none';
    document.getElementById('app').classList.add('visible');
    window.addEventListener('DOMContentLoaded', initChat);
  }

  // ---------- Chat + trwała pamięć ----------
  const log = document.getElementById('chatLog');
  const form = document.getElementById('chatForm');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const dot = document.getElementById('statusDot');
  const modelTag = document.getElementById('modelTag');
  const attachBtn = document.getElementById('attachBtn');
  const imageInput = document.getElementById('imageInput');
  const ocrStatus = document.getElementById('ocrStatus');

  let history = [];
  let firstMessage = true;
  let saveTimer = null;
  let currentModel = 'deepseek-chat';
  let lastGreetingDate = null;

  function todayStr(){
    return new Date().toISOString().slice(0, 10);
  }

  function addMsg(role, text) {
    if (firstMessage) { log.innerHTML = ''; firstMessage = false; }
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + role;
    const who = document.createElement('div');
    who.className = 'who';
    who.textContent = role === 'user' ? 'ty' : 'debrain';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    wrap.appendChild(who);
    wrap.appendChild(bubble);
    log.appendChild(wrap);
    log.scrollTop = log.scrollHeight;
    return bubble;
  }

  const GREETING_PROMPT = "[Nowy dzień] Przywitaj się krótko, po swojemu. Następnie podaj jeden cytat motywacyjny (dowolny autor, po polsku lub z tłumaczeniem) oraz jedną naprawdę niszową, mało znaną ciekawostkę o świecie — coś, czego większość ludzi nie słyszała, nie oczywiste jak 'miód nie psuje się'. Bądź zwięzły, bez gwiazdek.";

  async function initChat(){
    try {
      const res = await fetch('/api/debrain-memory');
      const data = await res.json();
      history = data.history || [];
      lastGreetingDate = data.lastGreetingDate || null;
      if (history.length === 0) {
        log.innerHTML = '<div class="empty">Twój agent. Pisze, przeszukuje sieć, zna dane z Bazy, pamięta rozmowę między sesjami.</div>';
      } else {
        firstMessage = true;
        history.forEach(m => {
          if (m.role === 'user' || (m.role === 'assistant' && m.content)) {
            addMsg(m.role, m.content);
          }
        });
      }
    } catch (e) {
      log.innerHTML = '<div class="empty">Twój agent. (Pamięć trwała niedostępna — sprawdź konfigurację.)</div>';
    }

    // Powitanie: raz dziennie, licząc od daty ostatniego, nie od otwarcia karty
    if (lastGreetingDate !== todayStr()) {
      lastGreetingDate = todayStr();
      await sendToDebrain(GREETING_PROMPT, { hideUserBubble: true });
    }
  }

  function queueSaveMemory(){
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      fetch('/api/debrain-memory', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ history, lastGreetingDate }),
      }).catch(() => {});
    }, 400);
  }

  async function sendToDebrain(text, opts = {}){
    if (!opts.hideUserBubble) addMsg('user', text);
    history.push({ role: 'user', content: text });
    sendBtn.disabled = true;
    dot.classList.add('thinking');

    const thinkingBubble = addMsg('assistant', 'myślę…');

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ history, model: currentModel }),
      });
      const data = await res.json();
      thinkingBubble.textContent = data.reply || ('Błąd: ' + (data.error || 'brak odpowiedzi'));
      history = data.history || history;
      if (data.model) { currentModel = data.model; modelTag.textContent = currentModel; }
      queueSaveMemory();
    } catch (err) {
      thinkingBubble.textContent = 'Błąd połączenia: ' + err.message;
    } finally {
      sendBtn.disabled = false;
      dot.classList.remove('thinking');
      log.scrollTop = log.scrollHeight;
    }
  }

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    input.style.height = 'auto';

    if (text === '/reasoner') {
      currentModel = 'deepseek-reasoner';
      modelTag.textContent = 'deepseek-reasoner';
      addMsg('assistant', 'Przełączono na deepseek-reasoner — wolniejszy, ale mocniejszy w wieloetapowym rozumowaniu.');
      return;
    }
    if (text === '/chat') {
      currentModel = 'deepseek-chat';
      modelTag.textContent = 'deepseek-chat';
      addMsg('assistant', 'Przełączono z powrotem na deepseek-chat.');
      return;
    }
    if (text === '/nowa') {
      history = [];
      firstMessage = true;
      log.innerHTML = '<div class="empty">Nowa rozmowa. Poprzednia pozostaje zapisana w pamięci trwałej, ale zaczynamy od zera w tej sesji.</div>';
      queueSaveMemory();
      return;
    }

    await sendToDebrain(text);
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      form.requestSubmit();
    }
  });

  // ---------- OCR zrzutów ekranu (Tesseract.js — działa w przeglądarce, bez wysyłania obrazu na serwer) ----------
  attachBtn.addEventListener('click', () => imageInput.click());

  imageInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    attachBtn.disabled = true;
    ocrStatus.style.display = 'block';
    ocrStatus.textContent = 'Czytam tekst ze zrzutu ekranu…';

    try {
      const worker = await Tesseract.createWorker('pol+eng');
      const { data: { text } } = await worker.recognize(file);
      await worker.terminate();

      const extracted = (text || '').trim();
      ocrStatus.style.display = 'none';
      imageInput.value = '';

      if (!extracted) {
        addMsg('assistant', 'Nie udało się odczytać żadnego tekstu z tego obrazu.');
        return;
      }
      const prompt = `[Odczytano tekst ze zrzutu ekranu przez OCR — to nie jest pełne widzenie obrazu, tylko wyekstrahowany tekst]\n\n${extracted}\n\nPrzeanalizuj powyższe.`;
      await sendToDebrain(prompt, { hideUserBubble: false });
    } catch (err) {
      ocrStatus.style.display = 'none';
      addMsg('assistant', 'Błąd OCR: ' + err.message);
    } finally {
      attachBtn.disabled = false;
    }
  });
</script>
</body>
</html>
