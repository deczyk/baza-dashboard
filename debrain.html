<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Debrain</title>
<meta name="theme-color" content="#14181B">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#14181B; --surface:#1C2226; --surface-2:#242B30; --line:#2E363C;
    --gold:#C9A876; --sage:#6B9C89; --text:#E8E4DB; --text-muted:#848D93; --danger:#B4664F;
    --font-mono:'JetBrains Mono', ui-monospace, 'SF Mono', Consolas, monospace;
    --font-sans:'Inter', -apple-system, system-ui, sans-serif;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-sans); overflow: hidden; }
  body { -webkit-font-smoothing: antialiased; overscroll-behavior: none; }

  /* ---------- Gate ---------- */
  #gate {
    position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 18px; z-index: 100;
  }
  #gate .mark { font-family: var(--font-mono); color: var(--sage); font-size: 12px; letter-spacing: .25em; text-transform: uppercase; }
  #gate input {
    background: var(--surface); border: 1px solid var(--line); color: var(--text);
    font-family: var(--font-mono); font-size: 20px; letter-spacing: .3em; text-align: center;
    padding: 14px 18px; border-radius: 8px; width: 200px; outline: none;
  }
  #gate input:focus { border-color: var(--sage); }
  #gate .err { color: var(--danger); font-size: 12px; font-family: var(--font-mono); height: 14px; }
  #gate button {
    background: var(--sage); color: #14181B; border: none; border-radius: 8px; padding: 12px 22px;
    font-family: var(--font-mono); font-weight: 600; letter-spacing: .1em; text-transform: uppercase; font-size: 12px;
    cursor: pointer;
  }

  /* ---------- App ---------- */
  #app { display: none; height: 100vh; }
  #app.visible { display: flex; }

  /* ---------- Sidebar ---------- */
  .sidebar {
    width: 220px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--line);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .sidebar-top { padding: 14px 12px 10px; border-bottom: 1px solid var(--line); }
  .sidebar-brand { font-size: 16px; font-weight: 700; margin-bottom: 4px; padding: 0 4px; }
  .sidebar-tagline { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); letter-spacing: .06em; text-transform: uppercase; padding: 0 4px; margin-bottom: 10px; }
  .sidebar-btn {
    width: 100%; background: var(--surface-2); border: 1px solid var(--line); color: var(--text);
    font-family: var(--font-sans); font-size: 12px; padding: 8px 10px; border-radius: 8px; cursor: pointer;
    text-align: left; margin-bottom: 6px;
  }
  .sidebar-btn:hover { border-color: var(--gold); }
  .sidebar-list { flex: 1; overflow-y: auto; padding: 8px; }
  .back-link { display: block; font-family: var(--font-mono); font-size: 10.5px; color: var(--text-muted); text-decoration: none; padding: 10px 12px 0; }
  .back-link:hover { color: var(--gold); }

  .folder { margin-bottom: 4px; }
  .folder-head {
    display: flex; align-items: center; gap: 6px; padding: 6px 8px; border-radius: 6px; cursor: pointer;
    font-size: 10.5px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; font-family: var(--font-mono);
  }
  .folder-head:hover { background: var(--surface-2); }
  .folder-head .arrow { transition: transform .15s; font-size: 9px; }
  .folder-head.collapsed .arrow { transform: rotate(-90deg); }
  .folder-actions { margin-left: auto; display: none; gap: 6px; }
  .folder-head:hover .folder-actions { display: flex; }
  .folder-actions span { opacity: .6; cursor: pointer; font-size: 12px; }
  .folder-actions span:hover { opacity: 1; }
  .folder-chats { padding-left: 8px; }
  .folder-chats.collapsed { display: none; }

  .chat-item {
    display: flex; align-items: center; gap: 6px; padding: 7px 8px; border-radius: 6px; cursor: pointer;
    font-size: 12px; color: var(--text-muted); margin-bottom: 1px;
  }
  .chat-item:hover { background: var(--surface-2); color: var(--text); }
  .chat-item.active { background: var(--surface-2); color: var(--gold); }
  .chat-item .title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chat-item .chat-actions { display: none; gap: 6px; flex-shrink: 0; }
  .chat-item:hover .chat-actions { display: flex; }
  .chat-item .chat-actions span { opacity: .6; font-size: 11px; }
  .chat-item .chat-actions span:hover { opacity: 1; }

  /* ---------- Main ---------- */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  header {
    padding: 14px 18px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .brand { display: flex; align-items: baseline; gap: 8px; min-width: 0; }
  .brand-name { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--sage); box-shadow: 0 0 6px var(--sage); animation: pulse 2.6s infinite; flex-shrink: 0; }
  .dot.thinking { animation: pulse 0.8s infinite; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(107,156,137,.5)} 70%{box-shadow:0 0 0 9px rgba(107,156,137,0)} 100%{box-shadow:0 0 0 0 rgba(107,156,137,0)} }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); letter-spacing: .06em; text-transform: uppercase; flex-shrink: 0; }

  main { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 14px; }
  .msg { display: flex; flex-direction: column; gap: 5px; max-width: 88%; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.assistant { align-self: flex-start; }
  .who { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); letter-spacing: .08em; text-transform: uppercase; }
  .bubble {
    padding: 11px 14px; border-radius: 12px; font-size: 14px; line-height: 1.55;
    white-space: pre-wrap; word-wrap: break-word;
  }
  .msg.user .bubble { background: rgba(201,168,118,0.14); color: var(--text); border: 1px solid var(--gold); border-bottom-right-radius: 3px; }
  .msg.assistant .bubble { background: var(--surface); border: 1px solid var(--line); border-bottom-left-radius: 3px; }
  .tool-steps { display: flex; flex-direction: column; gap: 3px; margin-bottom: 2px; }
  .tool-step {
    font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); opacity: .8;
    display: flex; align-items: center; gap: 6px; padding: 2px 4px;
  }
  .tool-step.done { color: var(--sage); }
  .tool-step .spin { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--gold); animation: pulse 1s infinite; flex-shrink: 0; }
  .tool-step.done .spin { background: var(--sage); animation: none; }

  footer { padding: 12px 18px 16px; border-top: 1px solid var(--line); flex-shrink: 0; }
  form { display: flex; gap: 10px; }
  button.attach {
    background: var(--surface); border: 1px solid var(--line); color: var(--text-muted);
    width: 46px; height: 46px; border-radius: 10px; font-size: 18px; cursor: pointer; flex-shrink: 0;
  }
  button.attach:hover { border-color: var(--sage); color: var(--sage); }
  button.attach:disabled { opacity: .5; cursor: default; }
  .ocr-status { font-family: var(--font-mono); font-size: 11px; color: var(--sage); margin-top: 8px; text-align: center; }
  textarea {
    flex: 1; resize: none; background: var(--surface); border: 1px solid var(--line); color: var(--text);
    font-family: var(--font-sans); font-size: 14px; padding: 12px 14px; border-radius: 10px; outline: none;
    min-height: 46px; max-height: 140px;
  }
  textarea:focus { border-color: var(--gold); }
  button.send {
    background: var(--gold); color: #14181B; border: none; padding: 0 20px;
    font-family: var(--font-mono); font-weight: 700; font-size: 12.5px; letter-spacing: .05em;
    text-transform: uppercase; border-radius: 10px; cursor: pointer;
  }
  button.send:disabled { opacity: .5; }
  button.send:active { transform: scale(.96); }

  .empty { color: var(--text-muted); font-size: 13px; margin-top: 30px; line-height: 1.7; font-family: var(--font-mono); text-align: center; }
  ::-webkit-scrollbar { width: 7px; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }

  @media (max-width: 640px) {
    .sidebar { position: fixed; inset: 0 auto 0 0; z-index: 50; transform: translateX(-100%); transition: transform .2s; }
    .sidebar.open { transform: translateX(0); }
    .menu-btn { display: inline-flex !important; }
  }
  .menu-btn { display: none; background: none; border: none; color: var(--text); font-size: 18px; cursor: pointer; margin-right: 4px; }
</style>
</head>
<body>

<div id="gate">
  <div class="mark">◆ DEBRAIN — DOSTĘP</div>
  <input id="pinInput" type="password" inputmode="numeric" maxlength="8" placeholder="PIN" autocomplete="off">
  <div class="err" id="gateErr"></div>
  <button onclick="tryUnlock()">Odblokuj</button>
</div>

<div id="app">
  <aside class="sidebar" id="sidebar">
    <a class="back-link" href="index.html">◆ Baza</a>
    <div class="sidebar-top">
      <div class="sidebar-brand">Debrain</div>
      <div class="sidebar-tagline">drugi mózg decza</div>
      <button class="sidebar-btn" id="newChatBtn">+ Nowa rozmowa</button>
      <button class="sidebar-btn" id="newFolderBtn">+ Nowy folder</button>
    </div>
    <div class="sidebar-list" id="sidebarList"></div>
  </aside>

  <div class="main">
    <header>
      <div class="brand">
        <button class="menu-btn" id="menuBtn">☰</button>
        <span class="dot" id="statusDot"></span>
        <span class="brand-name" id="chatTitle">Debrain</span>
      </div>
      <span class="tag" id="modelTag">deepseek-chat</span>
    </header>
    <main id="chatLog">
      <div class="empty">Ładowanie…</div>
    </main>
    <footer>
      <form id="chatForm">
        <button type="button" class="attach" id="attachBtn" title="Załącz zrzut ekranu (OCR)">📎</button>
        <input type="file" id="imageInput" accept="image/*" style="display:none">
        <textarea id="input" placeholder="Zapytaj Debrain… (/reasoner, /chat)" rows="1"></textarea>
        <button type="submit" class="send" id="sendBtn">Wyślij</button>
      </form>
      <div id="ocrStatus" class="ocr-status" style="display:none"></div>
    </footer>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<div class="modal-backdrop" id="profileModal">
  <div class="modal">
    <div class="modal-head"><div class="modal-title">Mój profil i osobowość</div><button class="modal-close" id="profileModalClose">×</button></div>
    <p style="color:var(--text-muted);font-size:12px;line-height:1.5">Profil jest wspólny dla komputera i decz.pl. Sugestie nie stają się stałą cechą, dopóki ich nie zatwierdzisz.</p>
    <div id="profileFields"></div>
    <div style="display:flex;gap:8px;margin:14px 0"><button class="sidebar-btn" id="profileSaveBtn" style="width:auto">Zapisz profil</button></div>
    <div class="modal-title" style="font-size:14px;margin-top:18px">Sugestie dotyczące użytkownika</div>
    <div id="profileSuggestions"><div class="empty">Brak sugestii.</div></div>
  </div>
</div>
<script>
  const DEBRAIN_PIN = "5855";

  function tryUnlock(){
    const val = document.getElementById('pinInput').value;
    if(val === DEBRAIN_PIN){
      sessionStorage.setItem('debrain_unlocked','1');
      document.getElementById('gate').style.display='none';
      document.getElementById('app').classList.add('visible');
      init();
    } else {
      document.getElementById('gateErr').textContent = 'Zły PIN';
      document.getElementById('pinInput').value='';
    }
  }
  document.getElementById('pinInput').addEventListener('keydown', e=>{ if(e.key==='Enter') tryUnlock(); });

  if(sessionStorage.getItem('debrain_unlocked')==='1'){
    document.getElementById('gate').style.display='none';
    document.getElementById('app').classList.add('visible');
    window.addEventListener('DOMContentLoaded', init);
  }

  // ---------- Stan ----------
  const log = document.getElementById('chatLog');
  const profileBtn = document.getElementById('profileBtn');
  const profileModal = document.getElementById('profileModal');
  const profileModalClose = document.getElementById('profileModalClose');
  const profileFields = document.getElementById('profileFields');
  const profileSuggestions = document.getElementById('profileSuggestions');
  const profileSaveBtn = document.getElementById('profileSaveBtn');
  const form = document.getElementById('chatForm');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const dot = document.getElementById('statusDot');
  const modelTag = document.getElementById('modelTag');
  const chatTitleEl = document.getElementById('chatTitle');
  const sidebarList = document.getElementById('sidebarList');
  const newChatBtn = document.getElementById('newChatBtn');
  const newFolderBtn = document.getElementById('newFolderBtn');
  const attachBtn = document.getElementById('attachBtn');
  const imageInput = document.getElementById('imageInput');
  const ocrStatus = document.getElementById('ocrStatus');
  const sidebar = document.getElementById('sidebar');
  const menuBtn = document.getElementById('menuBtn');

  let currentProfile = null;
  function profileTextarea(label, key, value) {
    return `<label style="display:block;margin:10px 0 4px;font-size:12px;color:var(--text-muted)">${label}</label><textarea data-profile-key="${key}" style="width:100%;min-height:66px;background:var(--surface-2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:9px">${String(value||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')}</textarea>`;
  }
  async function loadProfile() {
    const res = await fetch('/api/debrain-memory', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'profileGet',payload:{}})});
    const data = await res.json(); currentProfile = data.profile || {};
    const p=currentProfile;
    profileFields.innerHTML =
      profileTextarea('Dane podstawowe i firma','basic',JSON.stringify(p.basic||{},null,2)) +
      profileTextarea('Styl komunikacji','communication',JSON.stringify(p.communication||{},null,2)) +
      profileTextarea('Sposób pracy i priorytety','workStyle',JSON.stringify(p.workStyle||{},null,2)) +
      profileTextarea('Co lubię','likes',(p.likes||[]).join('\n')) +
      profileTextarea('Czego nie lubię','dislikes',(p.dislikes||[]).join('\n')) +
      profileTextarea('Co mnie motywuje','motivators',(p.motivators||[]).join('\n')) +
      profileTextarea('Zatwierdzone obserwacje','approvedObservations',(p.approvedObservations||[]).join('\n'));
    const pending=(p.suggestions||[]).filter(x=>x.status==='pending');
    profileSuggestions.innerHTML = pending.length ? pending.map(x=>`<div class="proposal" style="margin-top:8px"><div class="proposal-summary">${x.text}</div><div class="proposal-meta">${x.category||'osobowość'} · pewność ${Math.round((x.confidence||0)*100)}%</div><div class="proposal-actions"><button class="approve" data-sug="${x.id}" data-action="approve">Zatwierdź</button><button class="reject" data-sug="${x.id}" data-action="reject">Odrzuć</button></div></div>`).join('') : '<div class="empty">Brak sugestii.</div>';
    profileSuggestions.querySelectorAll('[data-sug]').forEach(btn=>btn.onclick=async()=>{
      const id=btn.dataset.sug, action=btn.dataset.action;
      const url='/api/debrain-memory';
      const body={action:'profileResolveSuggestion',payload:{suggestionId:id,resolution:action}};
      await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}); await loadProfile();
    });
  }
  profileBtn?.addEventListener('click',async()=>{profileModal.classList.add('open');await loadProfile();});
  profileModalClose?.addEventListener('click',()=>profileModal.classList.remove('open'));
  profileModal?.addEventListener('click',e=>{if(e.target===profileModal)profileModal.classList.remove('open');});
  profileSaveBtn?.addEventListener('click',async()=>{
    const next={...currentProfile};
    profileFields.querySelectorAll('[data-profile-key]').forEach(el=>{
      const k=el.dataset.profileKey;
      if(['basic','communication','workStyle'].includes(k)){try{next[k]=JSON.parse(el.value)}catch(e){throw new Error('Niepoprawny JSON w sekcji '+k)}}
      else next[k]=el.value.split('\n').map(x=>x.trim()).filter(Boolean);
    });
    const opts={method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'profileSave',payload:{profile:next}})};
    const r=await fetch('/api/debrain-memory',opts); const d=await r.json(); if(d.error||d.ok===false)alert(d.error||'Błąd zapisu'); else{currentProfile=d.profile||next;alert('Profil zapisany i zsynchronizowany.');}
  });

  let history = [];
  let firstMessage = true;
  let currentModel = 'deepseek-chat';
  let activeChatId = null;
  let folders = [];
  let chats = [];
  const collapsedFolders = new Set();

  menuBtn.addEventListener('click', () => sidebar.classList.toggle('open'));

  function escapeHtml(s){ const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

  function addMsg(role, text) {
    if (firstMessage) { log.innerHTML = ''; firstMessage = false; }
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + role;
    const who = document.createElement('div');
    who.className = 'who';
    who.textContent = role === 'user' ? 'ty' : 'debrain';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    wrap.appendChild(who);
    wrap.appendChild(bubble);
    log.appendChild(wrap);
    log.scrollTop = log.scrollHeight;
    return bubble;
  }

  const TOOL_LABELS = {
    web_search: 'przeszukuję sieć',
    read_baza_data: 'czytam dane z Bazy',
    update_baza_data: 'zapisuję do Bazy',
    read_calendar: 'sprawdzam kalendarz',
    create_calendar_event: 'dodaję do kalendarza',
    read_crm_data: 'czytam dane z CRM',
  };

  function addAssistantWithSteps() {
    if (firstMessage) { log.innerHTML = ''; firstMessage = false; }
    const wrap = document.createElement('div');
    wrap.className = 'msg assistant';
    const who = document.createElement('div');
    who.className = 'who';
    who.textContent = 'debrain';
    const stepsWrap = document.createElement('div');
    stepsWrap.className = 'tool-steps';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = 'myślę…';
    wrap.appendChild(who);
    wrap.appendChild(stepsWrap);
    wrap.appendChild(bubble);
    log.appendChild(wrap);
    log.scrollTop = log.scrollHeight;
    return { bubble, stepsWrap };
  }

  function addToolStep(stepsWrap, name) {
    const line = document.createElement('div');
    line.className = 'tool-step';
    line.dataset.name = name;
    line.innerHTML = `<span class="spin"></span><span>${TOOL_LABELS[name] || name}…</span>`;
    stepsWrap.appendChild(line);
    log.scrollTop = log.scrollHeight;
  }

  function finishToolStep(stepsWrap, name) {
    const lines = stepsWrap.querySelectorAll(`.tool-step[data-name="${name}"]`);
    const line = lines[lines.length - 1];
    if (line && !line.classList.contains('done')) {
      line.classList.add('done');
      line.querySelector('span:last-child').textContent = (TOOL_LABELS[name] || name);
    }
  }

  async function memAction(action, payload){
    const res = await fetch('/api/debrain-memory', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, payload }),
    });
    return res.json();
  }

  function renderSidebar() {
    sidebarList.innerHTML = '';
    const chatItemEl = (c) => {
      const el = document.createElement('div');
      el.className = 'chat-item' + (c.id === activeChatId ? ' active' : '');
      el.innerHTML = `<span class="title">${escapeHtml(c.title)}</span>
        <span class="chat-actions">
          <span data-act="rename" title="Zmień nazwę">✎</span>
          <span data-act="move" title="Przenieś do folderu">📁</span>
          <span data-act="delete" title="Usuń">✕</span>
        </span>`;
      el.addEventListener('click', (e) => { if (!e.target.dataset.act) loadChat(c.id); });
      el.querySelector('[data-act="rename"]').addEventListener('click', (e) => { e.stopPropagation(); renameChat(c.id, c.title); });
      el.querySelector('[data-act="move"]').addEventListener('click', (e) => { e.stopPropagation(); moveChat(c.id); });
      el.querySelector('[data-act="delete"]').addEventListener('click', (e) => { e.stopPropagation(); deleteChat(c.id); });
      return el;
    };

    folders.forEach(f => {
      const folderEl = document.createElement('div');
      folderEl.className = 'folder';
      const collapsed = collapsedFolders.has(f.id);
      const head = document.createElement('div');
      head.className = 'folder-head' + (collapsed ? ' collapsed' : '');
      head.innerHTML = `<span class="arrow">▾</span><span>${escapeHtml(f.name)}</span>
        <span class="folder-actions">
          <span data-act="rename">✎</span><span data-act="delete">✕</span>
        </span>`;
      head.addEventListener('click', (e) => {
        if (e.target.dataset.act) return;
        if (collapsedFolders.has(f.id)) collapsedFolders.delete(f.id); else collapsedFolders.add(f.id);
        renderSidebar();
      });
      head.querySelector('[data-act="rename"]').addEventListener('click', (e) => { e.stopPropagation(); renameFolder(f.id, f.name); });
      head.querySelector('[data-act="delete"]').addEventListener('click', (e) => { e.stopPropagation(); deleteFolder(f.id); });
      folderEl.appendChild(head);

      const chatsWrap = document.createElement('div');
      chatsWrap.className = 'folder-chats' + (collapsed ? ' collapsed' : '');
      chats.filter(c => c.folderId === f.id).forEach(c => chatsWrap.appendChild(chatItemEl(c)));
      folderEl.appendChild(chatsWrap);
      sidebarList.appendChild(folderEl);
    });

    chats.filter(c => !c.folderId).forEach(c => sidebarList.appendChild(chatItemEl(c)));
  }

  async function refreshState(){
    const res = await fetch('/api/debrain-memory');
    const data = await res.json();
    folders = data.folders || [];
    chats = data.chats || [];
    renderSidebar();
    return data.activeChatId;
  }

  async function loadChat(chatId){
    if (!chatId) return;
    activeChatId = chatId;
    sidebar.classList.remove('open');
    await memAction('setActive', { chatId });
    const data = await memAction('getChat', { chatId });
    history = data.history || [];
    chatTitleEl.textContent = data.title || 'Debrain';
    firstMessage = true;
    if (history.length === 0) {
      log.innerHTML = '<div class="empty">Nowa rozmowa. Napisz coś, żeby zacząć.</div>';
    } else {
      log.innerHTML = '';
      history.forEach(m => { if (m.content) addMsg(m.role, m.content); });
    }
    renderSidebar();
  }

  async function createNewChat(folderId){
    const data = await memAction('createChat', { folderId: folderId || null });
    await refreshState();
    await loadChat(data.id);
  }

  async function renameChat(chatId, currentTitle){
    const title = prompt('Nowa nazwa rozmowy:', currentTitle);
    if (title === null || !title.trim()) return;
    await memAction('renameChat', { chatId, title: title.trim() });
    if (chatId === activeChatId) chatTitleEl.textContent = title.trim();
    await refreshState();
  }

  async function moveChat(chatId){
    if (folders.length === 0) { alert('Nie masz jeszcze żadnego folderu. Utwórz go przyciskiem "+ Nowy folder".'); return; }
    const names = folders.map((f, i) => `${i+1}. ${f.name}`).join('\n');
    const choice = prompt('Do którego folderu przenieść? (numer, 0 = bez folderu)\n' + names);
    if (choice === null) return;
    const idx = parseInt(choice, 10);
    const folderId = idx === 0 || isNaN(idx) ? null : (folders[idx-1] ? folders[idx-1].id : null);
    await memAction('moveChat', { chatId, folderId });
    await refreshState();
  }

  async function deleteChat(chatId){
    if (!confirm('Usunąć tę rozmowę?')) return;
    const data = await memAction('deleteChat', { chatId });
    await refreshState();
    if (chatId === activeChatId) {
      if (data.activeChatId) await loadChat(data.activeChatId);
      else await createNewChat(null);
    }
  }

  async function createNewFolder(){
    const name = prompt('Nazwa nowego folderu:');
    if (!name || !name.trim()) return;
    await memAction('createFolder', { name: name.trim() });
    await refreshState();
  }

  async function renameFolder(folderId, currentName){
    const name = prompt('Nowa nazwa folderu:', currentName);
    if (name === null || !name.trim()) return;
    await memAction('renameFolder', { folderId, name: name.trim() });
    await refreshState();
  }

  async function deleteFolder(folderId){
    if (!confirm('Usunąć folder? Rozmowy w środku zostaną, wrócą do listy głównej.')) return;
    await memAction('deleteFolder', { folderId });
    await refreshState();
  }

  async function sendToDebrain(text, opts = {}){
    if (!opts.hideUserBubble) addMsg('user', text);
    history.push({ role: 'user', content: text });
    sendBtn.disabled = true;
    dot.classList.add('thinking');
    const { bubble: thinkingBubble, stepsWrap } = addAssistantWithSteps();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chatId: activeChatId, history, model: currentModel, hidden: !!opts.hideUserBubble }),
      });

      if (!res.body) {
        const data = await res.json();
        thinkingBubble.textContent = data.reply || ('Błąd: ' + (data.error || 'brak odpowiedzi'));
        history = data.history || history;
      } else {
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();
          for (const line of lines) {
            if (!line.trim()) continue;
            let event;
            try { event = JSON.parse(line); } catch (e) { continue; }
            if (event.type === 'tool_start') {
              addToolStep(stepsWrap, event.name);
            } else if (event.type === 'tool_end') {
              finishToolStep(stepsWrap, event.name);
            } else if (event.type === 'final') {
              if (event.error) { thinkingBubble.textContent = 'Błąd: ' + event.error; }
              else {
                thinkingBubble.textContent = event.reply || 'Błąd: brak odpowiedzi';
                history = event.history || history;
                if (event.model) { currentModel = event.model; modelTag.textContent = currentModel; }
              }
            }
          }
        }
      }

      const meta = chats.find(c => c.id === activeChatId);
      await refreshState();
      if (meta) chatTitleEl.textContent = (chats.find(c => c.id === activeChatId) || {}).title || chatTitleEl.textContent;
    } catch (err) {
      thinkingBubble.textContent = 'Błąd połączenia: ' + err.message;
    } finally {
      sendBtn.disabled = false;
      dot.classList.remove('thinking');
      log.scrollTop = log.scrollHeight;
    }
  }

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;
    input.value = ''; input.style.height = 'auto';

    if (text === '/reasoner') {
      currentModel = 'deepseek-reasoner'; modelTag.textContent = currentModel;
      addMsg('assistant', 'Przełączono na deepseek-reasoner — wolniejszy, ale mocniejszy w wieloetapowym rozumowaniu.');
      return;
    }
    if (text === '/chat') {
      currentModel = 'deepseek-chat'; modelTag.textContent = currentModel;
      addMsg('assistant', 'Przełączono z powrotem na deepseek-chat.');
      return;
    }
    await sendToDebrain(text);
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.altKey && !e.shiftKey && !e.ctrlKey) { e.preventDefault(); form.requestSubmit(); }
    // Alt+Enter (albo Shift/Ctrl+Enter) — nic nie robimy, przeglądarka sama wstawi nową linię
  });

  newChatBtn.addEventListener('click', () => createNewChat(null));
  newFolderBtn.addEventListener('click', createNewFolder);

  // ---------- OCR ----------
  attachBtn.addEventListener('click', () => imageInput.click());
  imageInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    attachBtn.disabled = true;
    ocrStatus.style.display = 'block';
    ocrStatus.textContent = 'Czytam tekst ze zrzutu ekranu…';
    try {
      const worker = await Tesseract.createWorker('pol+eng');
      const { data: { text } } = await worker.recognize(file);
      await worker.terminate();
      const extracted = (text || '').trim();
      ocrStatus.style.display = 'none';
      imageInput.value = '';
      if (!extracted) { addMsg('assistant', 'Nie udało się odczytać żadnego tekstu z tego obrazu.'); return; }
      const prompt2 = `[Odczytano tekst ze zrzutu ekranu przez OCR]\n\n${extracted}\n\nPrzeanalizuj powyższe.`;
      await sendToDebrain(prompt2, { hideUserBubble: false });
    } catch (err) {
      ocrStatus.style.display = 'none';
      addMsg('assistant', 'Błąd OCR: ' + err.message);
    } finally {
      attachBtn.disabled = false;
    }
  });

  // ---------- Start ----------
  async function init(){
    const activeId = await refreshState();
    if (activeId) await loadChat(activeId);
    else if (chats.length > 0) await loadChat(chats[0].id);
    else await createNewChat(null);

    // Powitanie raz dziennie
    const status = await memAction('getGreetingStatus', {});
    const today = new Date().toISOString().slice(0, 10);
    if (status.lastGreetingDate !== today) {
      const GREETING = "[Nowy dzień] Przywitaj się krótko, po swojemu. Następnie podaj jeden cytat motywacyjny (dowolny autor) oraz jedną naprawdę niszową, mało znaną ciekawostkę o świecie — coś, czego większość ludzi nie słyszała. Bądź zwięzły, bez gwiazdek.";
      await sendToDebrain(GREETING, { hideUserBubble: true });
      await memAction('setGreetingDate', { date: today });
    }
  }
</script>
