<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Baza</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#14181B">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  :root{
    --bg:#14181B;
    --surface:#1C2226;
    --surface-2:#242B30;
    --line:#2E363C;
    --gold:#C9A876;
    --sage:#6B9C89;
    --text:#E8E4DB;
    --text-muted:#848D93;
    --danger:#B4664F;
    --font-mono:'JetBrains Mono', ui-monospace, 'SF Mono', Consolas, monospace;
    --font-sans:'Inter', -apple-system, system-ui, sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text); font-family:var(--font-sans); height:100%;}
  body{ -webkit-font-smoothing:antialiased; overscroll-behavior:none; }

  /* ---------- Gate ---------- */
  #gate{
    position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:18px; z-index:100;
  }
  #gate .mark{ font-family:var(--font-mono); color:var(--gold); font-size:12px; letter-spacing:.25em; text-transform:uppercase; }
  #gate input{
    background:var(--surface); border:1px solid var(--line); color:var(--text);
    font-family:var(--font-mono); font-size:20px; letter-spacing:.3em; text-align:center;
    padding:14px 18px; border-radius:8px; width:200px; outline:none;
  }
  #gate input:focus{ border-color:var(--gold); }
  #gate .err{ color:var(--danger); font-size:12px; font-family:var(--font-mono); height:14px; }
  #gate button{
    background:var(--gold); color:#14181B; border:none; border-radius:8px; padding:12px 22px;
    font-family:var(--font-mono); font-weight:600; letter-spacing:.1em; text-transform:uppercase; font-size:12px;
    cursor:pointer;
  }

  /* ---------- Shell ---------- */
  #app{ display:none; max-width:640px; margin:0 auto; min-height:100%; padding:0 16px 90px; }
  #app.visible{ display:block; }

  header.top{ padding:26px 4px 6px; }
  .greeting{ font-size:22px; font-weight:600; }
  .readout{
    display:flex; align-items:center; gap:10px; margin-top:6px;
    font-family:var(--font-mono); font-size:11px; color:var(--text-muted); letter-spacing:.08em;
  }
  .dot{ width:6px; height:6px; border-radius:50%; background:var(--sage); box-shadow:0 0 6px var(--sage); }
  .dot.off{ background:var(--danger); box-shadow:0 0 6px var(--danger); }

  /* ---------- Launcher (hero) ---------- */
  .launcher-label{
    font-family:var(--font-mono); font-size:11px; color:var(--text-muted); letter-spacing:.15em; text-transform:uppercase;
    margin:26px 2px 10px;
  }
  .launcher{ display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; }
  .launch-tile{
    background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:20px 10px 16px;
    display:flex; flex-direction:column; align-items:center; gap:10px; text-decoration:none; color:var(--text);
    position:relative; overflow:hidden; transition:transform .15s ease, border-color .15s ease;
  }
  .launch-tile:active{ transform:scale(.96); }
  .launch-tile:hover{ border-color:var(--gold); }

  /* ---------- Status row (EUR / pogoda / countdown) ---------- */
  .status-row{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:16px 0 20px; }
  .status-card{
    background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:12px 10px;
    display:flex; flex-direction:column; gap:3px; align-items:flex-start;
  }
  .status-card .sc-label{ font-family:var(--font-mono); font-size:9px; color:var(--text-muted); letter-spacing:.08em; text-transform:uppercase; }
  .status-card .sc-value{ font-size:16px; font-weight:700; color:var(--text); }
  .status-card .sc-sub{ font-size:10px; color:var(--text-muted); }

  /* ---------- Priorytet dnia ---------- */
  .priority-box{
    background:linear-gradient(135deg, rgba(201,168,118,0.10), rgba(107,156,137,0.06));
    border:1px solid var(--gold); border-radius:14px; padding:16px; margin-bottom:20px;
  }
  .priority-box .pb-label{ font-family:var(--font-mono); font-size:10px; color:var(--gold); letter-spacing:.12em; text-transform:uppercase; margin-bottom:8px; }
  .priority-box textarea{
    width:100%; background:transparent; border:none; color:var(--text); font-family:var(--font-sans); font-size:16px;
    font-weight:600; outline:none; resize:none; min-height:30px; line-height:1.4; padding:0;
  }
  .priority-box textarea::placeholder{ color:var(--text-muted); font-weight:400; }

  .launch-tile .glyph{
    width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center;
    font-size:20px;
  }
  .launch-tile .lbl{ font-size:12.5px; font-weight:600; text-align:center; line-height:1.25; }
  .launch-tile .sub{ font-family:var(--font-mono); font-size:9.5px; color:var(--text-muted); letter-spacing:.06em; text-transform:uppercase; }
  .tile-drive .glyph{ background:rgba(107,156,137,0.16); color:var(--sage); }
  .tile-crm .glyph{ background:rgba(201,168,118,0.16); color:var(--gold); }
  .tile-tasks .glyph{ background:rgba(180,102,79,0.16); color:#D68F73; }

  /* ---------- Tabs ---------- */
  .tabs{
    display:flex; background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:4px; gap:4px;
    position:sticky; top:12px; z-index:10; margin:26px 0 16px;
  }
  .tab{
    flex:1; text-align:center; padding:9px 0; border-radius:7px; font-family:var(--font-mono);
    font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:var(--text-muted); cursor:pointer; user-select:none;
  }
  .tab.active{ background:var(--surface-2); color:var(--gold); }

  section.panel{ display:none; }
  section.panel.active{ display:block; }

  /* ---------- Links (edytowalne) ---------- */
  .links-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .link-tile{
    background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:16px 8px;
    display:flex; flex-direction:column; align-items:center; gap:8px; text-decoration:none; color:var(--text);
    position:relative;
  }
  .link-tile .ic{ font-size:20px; }
  .link-tile .lbl{ font-size:11px; text-align:center; color:var(--text-muted); line-height:1.3; }
  .link-tile .rm{ position:absolute; top:4px; right:6px; color:var(--text-muted); font-size:14px; opacity:.5; }
  .add-tile{
    background:transparent; border:1px dashed var(--line); border-radius:12px; padding:16px 8px;
    display:flex; align-items:center; justify-content:center; color:var(--text-muted); font-size:22px; cursor:pointer;
    min-height:74px;
  }

  /* ---------- Notes (schowek na myśli) ---------- */
  .note-add{ background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:12px; margin-bottom:14px; }
  .note-add textarea{
    width:100%; background:transparent; border:none; color:var(--text); font-family:var(--font-sans); font-size:13.5px;
    outline:none; resize:vertical; min-height:60px; line-height:1.5;
  }
  .note-add .save-row{ display:flex; justify-content:flex-end; margin-top:6px; }
  .note-add .save-row button{
    background:var(--gold); border:none; border-radius:7px; padding:7px 16px; color:#14181B; font-weight:700;
    font-size:12px; cursor:pointer;
  }
  .note{ background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:14px; margin-bottom:10px; }
  .note .nhead{ display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:6px; }
  .note .del{ color:var(--text-muted); font-size:15px; cursor:pointer; flex-shrink:0; }
  .note .nbody{ font-size:13.5px; line-height:1.55; white-space:pre-wrap; color:var(--text); }
  .note .ndate{ font-family:var(--font-mono); font-size:10px; color:var(--text-muted); }

  .empty{ color:var(--text-muted); font-size:13px; text-align:center; padding:30px 0; font-family:var(--font-mono); }

  /* ---------- Toast ---------- */
  #toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); opacity:0;
    background:var(--surface-2); border:1px solid var(--line); color:var(--text); padding:10px 18px; border-radius:20px;
    font-family:var(--font-mono); font-size:12px; transition:.25s; pointer-events:none; z-index:50; white-space:nowrap;
  }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  ::selection{ background:var(--gold); color:#14181B; }
</style>
</head>
<body>

<div id="gate">
  <div class="mark">◆ BAZA — DOSTĘP</div>
  <input id="pinInput" type="password" inputmode="numeric" maxlength="8" placeholder="PIN" autocomplete="off">
  <div class="err" id="gateErr"></div>
  <button onclick="tryUnlock()">Odblokuj</button>
</div>

<div id="app">
  <header class="top">
    <div class="greeting" id="greeting">Cześć.</div>
    <div class="readout"><span class="dot" id="syncDot"></span><span id="syncTxt">SYNC OK</span><span id="clock" style="margin-left:auto"></span></div>
  </header>

  <div class="launcher-label">◆ Start tutaj</div>
  <div class="launcher">
    <a class="launch-tile tile-drive" href="https://drive.google.com/drive/folders/18nLqq6sm6Vs5KomdBZFv2Z36UJAu7zM6?usp=sharing" target="_blank" rel="noopener">
      <div class="glyph">📁</div>
      <div class="lbl">Drive</div>
      <div class="sub">Notatki / dokumenty</div>
    </a>
    <a class="launch-tile tile-crm" href="https://www.sklepzastodola.pl/panel.html" target="_blank" rel="noopener">
      <div class="glyph">💼</div>
      <div class="lbl">Panel</div>
      <div class="sub">CRM</div>
    </a>
    <a class="launch-tile tile-tasks" href="https://app.super-productivity.com/" target="_blank" rel="noopener">
      <div class="glyph">✅</div>
      <div class="lbl">Taski</div>
      <div class="sub">Super Productivity</div>
    </a>
  </div>

  <div class="status-row">
    <div class="status-card">
      <span class="sc-label">EUR/PLN</span>
      <span class="sc-value" id="eurValue">—</span>
      <span class="sc-sub" id="eurDate">ładowanie…</span>
    </div>
    <div class="status-card">
      <span class="sc-label">Katowice</span>
      <span class="sc-value" id="weatherValue">—</span>
      <span class="sc-sub" id="weatherSub">ładowanie…</span>
    </div>
    <div class="status-card">
      <span class="sc-label">Mlekomat #1</span>
      <span class="sc-value" id="countdownValue">—</span>
      <span class="sc-sub">do startu</span>
    </div>
  </div>

  <div class="priority-box">
    <div class="pb-label">◆ Priorytet dnia</div>
    <textarea id="priorityInput" placeholder="Jedna najważniejsza rzecz na dziś…" rows="1" oninput="autoResize(this)"></textarea>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="links">Linki</div>
    <div class="tab" data-tab="notes">Schowek</div>
  </div>

  <section class="panel active" id="panel-links">
    <div class="links-grid" id="linksGrid"></div>
  </section>

  <section class="panel" id="panel-notes">
    <div class="note-add">
      <textarea id="noteBodyInput" placeholder="Szybka myśl, która nie pasuje jeszcze nigdzie indziej..."></textarea>
      <div class="save-row"><button onclick="addNote()">Zapisz</button></div>
    </div>
    <div id="notesList"></div>
  </section>
</div>

<div id="toast"></div>

<script>
/* =========================================================
   KONFIGURACJA — uzupełnij przed wdrożeniem
   ========================================================= */
const CONFIG = {
  PIN: "5855",                 // <-- ustaw własny PIN
  JSONBIN_BIN_ID: "6a4ffef3f5f4af5e29794a3e",     // <-- z jsonbin.io
  JSONBIN_API_KEY: "TWOJ_MASTER_KEY" // <-- X-Master-Key z jsonbin.io
};

const JSONBIN_BASE = `https://api.jsonbin.io/v3/b/${CONFIG.JSONBIN_BIN_ID}`;

let DATA = { links: [], notes: [], priority: { text:"", date:"" } };
let saveTimer = null;
let priorityTimer = null;

/* ---------- Gate ---------- */
function tryUnlock(){
  const val = document.getElementById('pinInput').value;
  if(val === CONFIG.PIN){
    sessionStorage.setItem('baza_unlocked','1');
    document.getElementById('gate').style.display='none';
    document.getElementById('app').classList.add('visible');
    boot();
  } else {
    document.getElementById('gateErr').textContent = 'Zły PIN';
    document.getElementById('pinInput').value='';
  }
}
document.getElementById('pinInput').addEventListener('keydown', e=>{ if(e.key==='Enter') tryUnlock(); });

if(sessionStorage.getItem('baza_unlocked')==='1'){
  document.getElementById('gate').style.display='none';
  document.getElementById('app').classList.add('visible');
  window.addEventListener('DOMContentLoaded', boot);
}

/* ---------- Boot ---------- */
function boot(){
  setGreeting();
  tickClock();
  setInterval(tickClock, 1000);
  document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click', ()=>switchTab(t.dataset.tab)));
  loadData();
  loadEurRate();
  loadWeather();
  renderCountdown();
  document.getElementById('priorityInput').addEventListener('input', e=>{
    clearTimeout(priorityTimer);
    priorityTimer = setTimeout(()=>savePriority(e.target.value), 500);
  });
}

/* ---------- EUR/PLN (NBP API) ---------- */
async function loadEurRate(){
  try{
    const res = await fetch('https://api.nbp.pl/api/exchangerates/rates/a/eur/?format=json');
    const json = await res.json();
    const rate = json.rates[0].mid;
    document.getElementById('eurValue').textContent = rate.toFixed(4) + ' zł';
    document.getElementById('eurDate').textContent = 'kurs NBP ' + json.rates[0].effectiveDate;
  }catch(e){
    document.getElementById('eurValue').textContent = '—';
    document.getElementById('eurDate').textContent = 'brak danych';
  }
}

/* ---------- Pogoda Katowice (Open-Meteo) ---------- */
const WMO_LABELS = {
  0:'Bezchmurnie', 1:'Prawie bezchmurnie', 2:'Częściowo pochmurno', 3:'Pochmurno',
  45:'Mgła', 48:'Mgła szronowa', 51:'Mżawka', 53:'Mżawka', 55:'Mżawka',
  61:'Deszcz', 63:'Deszcz', 65:'Silny deszcz', 71:'Śnieg', 73:'Śnieg', 75:'Silny śnieg',
  80:'Przelotny deszcz', 81:'Przelotny deszcz', 82:'Ulewa', 95:'Burza', 96:'Burza z gradem'
};
async function loadWeather(){
  try{
    const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=50.2649&longitude=19.0238&current=temperature_2m,weather_code&timezone=Europe/Warsaw');
    const json = await res.json();
    const temp = Math.round(json.current.temperature_2m);
    const label = WMO_LABELS[json.current.weather_code] || 'Zmiennie';
    document.getElementById('weatherValue').textContent = temp + '°C';
    document.getElementById('weatherSub').textContent = label;
  }catch(e){
    document.getElementById('weatherValue').textContent = '—';
    document.getElementById('weatherSub').textContent = 'brak danych';
  }
}

/* ---------- Countdown do pierwszego mlekomatu ---------- */
function renderCountdown(){
  const target = new Date('2026-08-01T00:00:00');
  const now = new Date();
  const diffDays = Math.ceil((target - now) / 86400000);
  document.getElementById('countdownValue').textContent = diffDays > 0 ? diffDays + ' dni' : 'start!';
}

/* ---------- Priorytet dnia ---------- */
function todayStr(){ return new Date().toISOString().slice(0,10); }
function loadPriority(){
  const input = document.getElementById('priorityInput');
  if(DATA.priority && DATA.priority.date === todayStr()){
    input.value = DATA.priority.text || '';
  } else {
    input.value = '';
  }
  autoResize(input);
}
function savePriority(text){
  DATA.priority = { text, date: todayStr() };
  queueSave();
}
function autoResize(el){
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function setGreeting(){
  const h = new Date().getHours();
  const g = h<5 ? 'Późna noc.' : h<12 ? 'Dzień dobry.' : h<18 ? 'Cześć.' : h<22 ? 'Dobry wieczór.' : 'Późna pora.';
  document.getElementById('greeting').textContent = g;
}
function tickClock(){
  const d = new Date();
  document.getElementById('clock').textContent = d.toLocaleDateString('pl-PL',{weekday:'short',day:'2-digit',month:'2-digit'}) + ' · ' + d.toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'});
}

function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===name));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active', p.id==='panel-'+name));
}

/* ---------- Sync (jsonbin.io) ---------- */
async function loadData(){
  try{
    const res = await fetch(`${JSONBIN_BASE}/latest`, { headers:{ 'X-Master-Key': CONFIG.JSONBIN_API_KEY }});
    if(!res.ok) throw new Error('fetch failed');
    const json = await res.json();
    DATA = json.record && (json.record.links || json.record.notes || json.record.priority) ? json.record : DATA;
    if(!DATA.priority) DATA.priority = { text:"", date:"" };
    setSyncStatus(true);
  }catch(e){
    setSyncStatus(false, 'brak danych — lokalnie');
  }
  renderAll();
}

function queueSave(){
  setSyncStatus(true, 'zapisywanie…');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveData, 600);
}

async function saveData(){
  try{
    const res = await fetch(JSONBIN_BASE, {
      method:'PUT',
      headers:{ 'Content-Type':'application/json', 'X-Master-Key': CONFIG.JSONBIN_API_KEY },
      body: JSON.stringify(DATA)
    });
    if(!res.ok) throw new Error('save failed');
    setSyncStatus(true, 'SYNC OK');
  }catch(e){
    setSyncStatus(false, 'błąd zapisu');
  }
}

function setSyncStatus(ok, txt){
  document.getElementById('syncDot').classList.toggle('off', !ok);
  document.getElementById('syncTxt').textContent = txt || (ok ? 'SYNC OK' : 'OFFLINE');
}

/* ---------- Render ---------- */
function renderAll(){ renderLinks(); renderNotes(); loadPriority(); }

/* Links */
function renderLinks(){
  const grid = document.getElementById('linksGrid');
  grid.innerHTML = '';
  DATA.links.forEach((l, i)=>{
    const a = document.createElement('a');
    a.className = 'link-tile'; a.href = l.url; a.target = '_blank'; a.rel='noopener';
    a.innerHTML = `<span class="rm" onclick="event.preventDefault();event.stopPropagation();removeLink(${i})">✕</span>
                   <span class="ic">${l.icon||'🔗'}</span><span class="lbl">${escapeHtml(l.name)}</span>`;
    grid.appendChild(a);
  });
  const add = document.createElement('div');
  add.className = 'add-tile';
  add.textContent = '+';
  add.onclick = addLinkPrompt;
  grid.appendChild(add);
}
function addLinkPrompt(){
  const name = prompt('Nazwa (np. Vercel, GitHub, KeePass):');
  if(!name) return;
  let url = prompt('Adres URL:');
  if(!url) return;
  if(!/^https?:\/\//.test(url)) url = 'https://' + url;
  const icon = prompt('Emoji (opcjonalnie):','🔗') || '🔗';
  DATA.links.push({ name, url, icon });
  renderLinks(); queueSave();
}
function removeLink(i){ DATA.links.splice(i,1); renderLinks(); queueSave(); }

/* Notes (schowek na myśli) */
function addNote(){
  const body = document.getElementById('noteBodyInput').value.trim();
  if(!body) return;
  DATA.notes.unshift({ body, id:Date.now(), date:new Date().toISOString() });
  document.getElementById('noteBodyInput').value='';
  renderNotes(); queueSave();
}
function removeNote(id){
  DATA.notes = DATA.notes.filter(n=>n.id!==id);
  renderNotes(); queueSave();
}
function renderNotes(){
  const list = document.getElementById('notesList');
  if(DATA.notes.length===0){ list.innerHTML = '<div class="empty">Schowek pusty</div>'; return; }
  list.innerHTML = '';
  DATA.notes.forEach(n=>{
    const el = document.createElement('div');
    el.className = 'note';
    const d = n.date ? new Date(n.date).toLocaleDateString('pl-PL',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
    el.innerHTML = `<div class="nhead"><span class="ndate">${d}</span><div class="del" onclick="removeNote(${n.id})">✕</div></div>
                     <div class="nbody">${escapeHtml(n.body)}</div>`;
    list.appendChild(el);
  });
}

function escapeHtml(s){
  const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}
</script>
</body>
</html>
